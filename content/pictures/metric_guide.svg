<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260" role="img" aria-labelledby="title desc">
  <title id="title">Metric guide</title>
  <desc id="desc">Captioning, VQA, and continual learning metrics used in the ECA results table.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-20%" width="116%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 850 23px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .label { font: 800 16px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .text { font: 650 17px 'Segoe UI', Arial, sans-serif; fill: #d1d5db; }
    </style>
  </defs>
  <g filter="url(#shadow)">
    <rect x="26" y="22" width="1048" height="204" rx="18" fill="#ffffff" fill-opacity="0.045"/>
  </g>
  <text x="52" y="58" class="title">Metric guide</text>

  <rect x="52" y="82" width="132" height="30" rx="15" fill="#d97706" fill-opacity="0.30"/>
  <text x="72" y="103" class="label">Captioning</text>
  <text x="212" y="103" class="text">BLEU-4 · CIDEr · SPICE</text>

  <rect x="52" y="128" width="72" height="30" rx="15" fill="#2563eb" fill-opacity="0.30"/>
  <text x="75" y="149" class="label">VQA</text>
  <text x="212" y="149" class="text">VQA Acc</text>

  <rect x="52" y="168" width="116" height="30" rx="15" fill="#7c3aed" fill-opacity="0.30"/>
  <text x="72" y="189" class="label">Continual</text>
  <text x="212" y="189" class="text">Avg (final average) · BWT (backward transfer) · FWT (forward transfer)</text>
</svg>
