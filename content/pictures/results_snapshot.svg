  <text x="350" y="437" class="cell">CIDEr</text>
  <text x="545" y="437" class="num">21.74M</text>
  <text x="735" y="437" class="num">103.03</text>
  <text x="870" y="437" class="num">1.94</text>
  <text x="995" y="437" class="num">39.22</text>
  <rect x="54" y="452" width="992" height="34" rx="9" fill="#fbbf24" fill-opacity="0.085" stroke="#fbbf24" stroke-opacity="0.08"/>
  <text x="54" y="476" class="cell">ToS-TextCaps</text>
  <text x="350" y="476" class="cell">SPICE</text>
  <text x="545" y="476" class="num">21.74M</text>
  <text x="735" y="476" class="num">16.86</text>
  <text x="870" y="476" class="num">0.14</text>
  <text x="995" y="476" class="num">4.39</text>
  <rect x="54" y="491" width="992" height="34" rx="9" fill="#c084fc" fill-opacity="0.085" stroke="#c084fc" stroke-opacity="0.08"/>
