  <text x="735" y="515" class="num">38.13</text>
  <text x="870" y="515" class="num">2.36</text>
  <text x="995" y="515" class="num">19.30</text>

  <text x="54" y="578" class="small">The parameter column reports trainable parameters only and follows Table 1 and Table 2 in the paper.</text>
