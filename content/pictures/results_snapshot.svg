  <text x="870" y="359" class="num">1.81</text>
  <text x="995" y="359" class="num">16.38</text>
  <rect x="54" y="374" width="992" height="34" rx="9" fill="#fbbf24" fill-opacity="0.085" stroke="#fbbf24" stroke-opacity="0.08"/>
  <text x="54" y="398" class="cell">ToS-TextCaps</text>
  <text x="350" y="398" class="cell">BLEU-4</text>
  <text x="545" y="398" class="num">21.74M</text>
  <text x="735" y="398" class="num">30.05</text>
  <text x="870" y="398" class="num">-0.18</text>
  <text x="995" y="398" class="num">12.13</text>
  <rect x="54" y="413" width="992" height="34" rx="9" fill="#fbbf24" fill-opacity="0.085" stroke="#fbbf24" stroke-opacity="0.08"/>
