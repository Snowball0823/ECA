<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">ECA ToS benchmark cards</title><desc id="desc">Four ToS benchmarks with source datasets, task categories, metrics, and annotation groups.</desc>
  <defs><linearGradient id="cocoTint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fb7185" stop-opacity="0.13"/><stop offset="1" stop-color="#fb923c" stop-opacity="0.045"/></linearGradient><linearGradient id="vqaTint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8" stop-opacity="0.13"/><stop offset="1" stop-color="#2563eb" stop-opacity="0.045"/></linearGradient><linearGradient id="textcapsTint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24" stop-opacity="0.13"/><stop offset="1" stop-color="#f97316" stop-opacity="0.045"/></linearGradient><linearGradient id="textvqaTint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c084fc" stop-opacity="0.13"/><stop offset="1" stop-color="#ec4899" stop-opacity="0.045"/></linearGradient><style>.title{font:800 25px 'Segoe UI',Arial,sans-serif;fill:#111827}.badge{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#ffffff}.label{font:800 16px 'Segoe UI',Arial,sans-serif}.value{font:600 16px 'Segoe UI',Arial,sans-serif;fill:#334155}.small{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#475569}.hint{font:italic 16px 'Segoe UI',Arial,sans-serif;fill:#64748b}</style></defs>
  <text x="34" y="44" class="title">ECA ToS Benchmarks</text><text x="34" y="72" class="small">Each benchmark is split by main visual topic while preserving cross-topic overlap inside each task.</text>
  <g><rect x="34" y="108" width="516" height="178" rx="20" fill="url(#cocoTint)" stroke="#fb7185" stroke-opacity="0.18"/><text x="58" y="146" class="title">ToS-COCO Caption</text><rect x="442" y="124" width="74" height="28" rx="14" fill="#be123c"/><text x="466" y="143" class="badge">IC</text><text x="58" y="180" class="label" fill="#e11d48">Source Dataset</text><text x="214" y="180" class="value">MSCOCO Caption</text><text x="58" y="212" class="label" fill="#e11d48">Task</text><text x="214" y="212" class="value">Image Captioning (IC)</text><text x="58" y="244" class="label" fill="#e11d48">Metrics</text><text x="214" y="244" class="value">BLEU-4 · CIDEr · SPICE</text><text x="58" y="270" class="hint">annotations: train · val · test · topics</text></g>
  <g><rect x="584" y="108" width="482" height="178" rx="20" fill="url(#vqaTint)" stroke="#38bdf8" stroke-opacity="0.18"/><text x="608" y="146" class="title">ToS-VQAv2</text><rect x="962" y="124" width="62" height="28" rx="14" fill="#0e7490"/><text x="979" y="143" class="badge">VQA</text><text x="608" y="180" class="label" fill="#0284c7">Source Dataset</text><text x="764" y="180" class="value">VQAv2</text><text x="608" y="212" class="label" fill="#0284c7">Task</text><text x="764" y="212" class="value">Visual Question Answering (VQA)</text><text x="608" y="244" class="label" fill="#0284c7">Metrics</text><text x="764" y="244" class="value">VQA accuracy</text><text x="608" y="270" class="hint">annotations: train · val-eval · topics</text></g>
  <g><rect x="34" y="316" width="516" height="178" rx="20" fill="url(#textcapsTint)" stroke="#fbbf24" stroke-opacity="0.18"/><text x="58" y="354" class="title">ToS-TextCaps</text><rect x="442" y="332" width="74" height="28" rx="14" fill="#a16207"/><text x="466" y="351" class="badge">IC</text><text x="58" y="388" class="label" fill="#d97706">Source Dataset</text><text x="214" y="388" class="value">TextCaps</text><text x="58" y="420" class="label" fill="#d97706">Task</text><text x="214" y="420" class="value">Image Captioning (IC)</text><text x="58" y="452" class="label" fill="#d97706">Metrics</text><text x="214" y="452" class="value">BLEU-4 · CIDEr · SPICE</text><text x="58" y="478" class="hint">annotations: train · val · val-eval · topics</text></g>
  <g><rect x="584" y="316" width="482" height="178" rx="20" fill="url(#textvqaTint)" stroke="#c084fc" stroke-opacity="0.18"/><text x="608" y="354" class="title">ToS-TextVQA</text><rect x="962" y="332" width="62" height="28" rx="14" fill="#7c3aed"/><text x="979" y="351" class="badge">VQA</text><text x="608" y="388" class="label" fill="#9333ea">Source Dataset</text><text x="764" y="388" class="value">TextVQA</text><text x="608" y="420" class="label" fill="#9333ea">Task</text><text x="764" y="420" class="value">Visual Question Answering (VQA)</text><text x="608" y="452" class="label" fill="#9333ea">Metrics</text><text x="764" y="452" class="value">VQA accuracy</text><text x="608" y="478" class="hint">annotations: train · val · val-eval · topics</text></g>
</svg>
