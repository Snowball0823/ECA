<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" role="img" aria-labelledby="title desc">
  <title id="title">ECA core components</title><desc id="desc">Mixture of Query, Fisher Dynamic Expansion, and Dictionary Replay.</desc>
  <defs><linearGradient id="moq" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/><stop offset="1" stop-color="#f97316" stop-opacity="0.09"/></linearGradient><linearGradient id="fedex" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60a5fa" stop-opacity="0.22"/><stop offset="1" stop-color="#2563eb" stop-opacity="0.09"/></linearGradient><linearGradient id="dr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c084fc" stop-opacity="0.22"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0.09"/></linearGradient><style>.body{font:650 19px 'Segoe UI',Arial,sans-serif;fill:#334155}.badge{font:800 18px 'Segoe UI',Arial,sans-serif;fill:#ffffff}.emoji{font:22px 'Segoe UI Emoji','Apple Color Emoji',sans-serif}</style></defs>
  <g><rect x="34" y="26" width="1032" height="88" rx="18" fill="url(#moq)" stroke="#f59e0b" stroke-opacity="0.26"/><rect x="54" y="46" width="292" height="34" rx="8" fill="#c2410c"/><rect x="54" y="46" width="44" height="34" rx="8" fill="#fed7aa"/><text x="66" y="70" class="emoji">🧭</text><text x="112" y="69" class="badge">Mixture of Query (MoQ)</text><text x="54" y="102" class="body">Learns task-specific query tokens and mixes them with pretrained queries to capture new visual-text cues.</text></g>
  <g><rect x="34" y="126" width="1032" height="88" rx="18" fill="url(#fedex)" stroke="#60a5fa" stroke-opacity="0.26"/><rect x="54" y="146" width="388" height="34" rx="8" fill="#2563eb"/><rect x="54" y="146" width="44" height="34" rx="8" fill="#dbeafe"/><text x="66" y="170" class="emoji">🚀</text><text x="112" y="169" class="badge">Fisher Dynamic Expansion (FeDEx)</text><text x="54" y="202" class="body">Measures task interference with an FIM-based signal and expands adapters only when capacity is needed.</text></g>
  <g><rect x="34" y="226" width="1032" height="88" rx="18" fill="url(#dr)" stroke="#c084fc" stroke-opacity="0.26"/><rect x="54" y="246" width="284" height="34" rx="8" fill="#7c3aed"/><rect x="54" y="246" width="44" height="34" rx="8" fill="#f3e8ff"/><text x="66" y="270" class="emoji">📖</text><text x="112" y="269" class="badge">Dictionary Replay (DR)</text><text x="54" y="302" class="body">Stores compact visual knowledge in a sparse embedding dictionary and replays reconstructed embeddings.</text></g>
</svg>
