<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" role="img" aria-labelledby="title desc">
  <title id="title">ECA core components</title>
  <desc id="desc">Mixture of Query, Fisher Dynamic Expansion, and Dictionary Replay.</desc>
  <defs>
    <linearGradient id="moq" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a2414"/><stop offset="1" stop-color="#17130f"/></linearGradient>
    <linearGradient id="fedex" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#162a4d"/><stop offset="1" stop-color="#101722"/></linearGradient>
    <linearGradient id="dr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#33284a"/><stop offset="1" stop-color="#191622"/></linearGradient>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .body { font: 500 19px 'Segoe UI', Arial, sans-serif; fill: #d1d5db; }
      .badge { font: 800 18px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .emoji { font: 22px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; }
    </style>
  </defs>

  <g>
    <rect x="34" y="26" width="1032" height="88" rx="18" fill="#f59e0b" fill-opacity="0.075" stroke="#f59e0b" stroke-opacity="0.16"/>
    <rect x="54" y="46" width="292" height="34" rx="8" fill="#c2410c"/>
    <rect x="54" y="46" width="44" height="34" rx="8" fill="#fed7aa"/>
    <text x="66" y="70" class="emoji">🧭</text>
    <text x="112" y="69" class="badge">Mixture of Query (MoQ)</text>
    <text x="54" y="102" class="body">Learns task-specific query tokens and mixes them with pretrained queries to capture new visual-text cues.</text>
  </g>

  <g>
    <rect x="34" y="126" width="1032" height="88" rx="18" fill="#60a5fa" fill-opacity="0.075" stroke="#60a5fa" stroke-opacity="0.16"/>
    <rect x="54" y="146" width="388" height="34" rx="8" fill="#2563eb"/>
    <rect x="54" y="146" width="44" height="34" rx="8" fill="#dbeafe"/>
    <text x="66" y="170" class="emoji">🚀</text>
    <text x="112" y="169" class="badge">Fisher Dynamic Expansion (FeDEx)</text>
    <text x="54" y="202" class="body">Measures task interference with an FIM-based signal and expands adapters only when capacity is needed.</text>
  </g>

  <g>
    <rect x="34" y="226" width="1032" height="88" rx="18" fill="#c084fc" fill-opacity="0.075" stroke="#c084fc" stroke-opacity="0.16"/>
    <rect x="54" y="246" width="284" height="34" rx="8" fill="#7c3aed"/>
    <rect x="54" y="246" width="44" height="34" rx="8" fill="#f3e8ff"/>
    <text x="66" y="270" class="emoji">📖</text>
    <text x="112" y="269" class="badge">Dictionary Replay (DR)</text>
    <text x="54" y="302" class="body">Stores compact visual knowledge in a sparse embedding dictionary and replays reconstructed embeddings.</text>
  </g>
</svg>
