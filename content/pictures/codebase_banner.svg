<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="150" viewBox="0 0 1100 150" role="img" aria-labelledby="title desc">
  <title id="title">Codebase</title>
  <desc id="desc">Supported backbones, reproduced methods, setup steps, checkpoints, and runnable configs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111a27"/>
      <stop offset="1" stop-color="#1d1828"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="12%" r="90%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#60a5fa" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 900 38px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #d1d5db; }
      .mark { fill: #60a5fa; opacity: 0.92; }
    </style>
  </defs>
  <g filter="url(#shadow)">
    <rect x="18" y="18" width="1064" height="114" rx="24" fill="#60a5fa" fill-opacity="0.075" stroke="#60a5fa" stroke-opacity="0.18"/>
    <rect x="18" y="18" width="1064" height="114" rx="24" fill="url(#glow)" opacity="0.55"/>
    <rect x="44" y="42" width="7" height="66" rx="3.5" class="mark"/>
    <text x="72" y="69" class="title">Codebase</text>
    <text x="72" y="102" class="subtitle">Supported backbones, reproduced methods, setup steps, checkpoints, and runnable configs.</text>
  </g>
</svg>
