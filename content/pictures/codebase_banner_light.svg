      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.24"/>
      <stop offset="0.58" stop-color="#7c3aed" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
