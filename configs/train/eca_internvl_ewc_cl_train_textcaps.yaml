# ===================== Model definition =====================
model:
  arch: pa_internvl_general
  model_type: cl_caption_internvl2_5
  # `model_path` selects the InternVL2.5 checkpoint size, e.g. 1B, 4B, or 8B.

  # Checkpoint / loader ------------------------------------------------
  load_pretrained: true
  model_path: checkpoints/InternVL/InternVL2_5-1B
  # Official 2.5-1B checkpoint defaults to flash attention, but the
  # current ECA adapter path only supports eager attention.
  use_flash_attn: false
  llm_config:
    attn_implementation: eager
    _attn_implementation: eager

  # Official InternVL config ------------------------------------------
  template: internvl2_5
  select_layer: -1
  force_image_size: 448
  dynamic_image_size: true
  use_thumbnail: true
  ps_version: v2
  min_dynamic_patch: 1
  # Official caption eval uses --dynamic with default max-num=6.
  max_dynamic_patch: 6
  downsample_ratio: 0.5
  # Checkpoint / stage-1 defaults are 16384; 2nd finetune commonly drops to 8192.
  model_max_length: 8192
  drop_path_rate: 0.0

  # Vision & adapters --------------------------------------------------
  freeze_vit: true
  train_projector: false
  vision_lora_r: 16
  vision_lora_alpha: 32

  # Soft prompt / MoQ --------------------------------------------------
  soft_prompt_len: 32
  use_prompt_anchor: false
  mix_query: false
  kd_weight: 0.1
  ortho: true
  ortho_weight: 1.0

  # Adapter settings ---------------------------------------------------
  alignment_layers: 4
  mh_pa_r: 32.0
  mh_pa_dropout: 0.0
  mh_pa_scale: 4.0
  ffn_pa_r: 8.0
  ffn_pa_dropout: 0.0
  ffn_pa_scale: 4.0

  # Text / prompts -----------------------------------------------------
  dict_patch_blocks: 1
  max_txt_len: 16384
  # Official caption eval uses 30 / 8 for max / min new tokens.
  max_answer_len: 30
  prompt: "Provide a one-sentence caption for the provided image."
  kd_prompt: "Provide a one-sentence caption for the provided image."

# ===================== Dataset + processors =====================
datasets:
  cl_textcaps_caption_internvl:
    vis_processor:
      train:
        name: internvl_image_train
        image_size: 448
        dynamic_image_size: true
        use_thumbnail: true
        min_dynamic_patch: 1
        max_dynamic_patch: 6
        pad2square: false
        normalize_type: imagenet
      eval:
        name: internvl_image_eval
        image_size: 448
        dynamic_image_size: true
        use_thumbnail: true
        min_dynamic_patch: 1
        max_dynamic_patch: 6
        pad2square: false
        normalize_type: imagenet
    text_processor:
      train:
        name: "blip_caption"
        prompt: "Provide a one-sentence caption for the provided image."
      eval:
        name: "blip_caption"

# ===================== Training / runner settings =====================
run:
  runner: runner_cl
  task: eca_internvl_captioning
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 100
  weight_decay: 0.05
  # Official InternVL2.5 8B 2nd-finetune also uses weight_decay=0.05.
  lr_layer_decay: 1.0
  max_epoch: 5
  batch_size_train: 4
  batch_size_eval: 16
  num_workers: 32
  accum_grad_iters: 1

  # Official InternVL caption eval uses 30 / 8 with greedy decoding.
  max_len: 30
  min_len: 8
  num_beams: 1
  temperature: 0.0
  top_p: null

  init_topic: 1
  topic_per_task: 1

  expand_pa: true
  fim_metric: "i_fim"
  # EWC baseline keeps the initial PA and prevents further FeDEx expansion.
  # i_fim is normalized to [0, 1], and expansion uses fim_dc > threshold.
  fim_threshold: 1.0
  use_ewc: true
  lora_visual_first: false

  dictionary_learning:
    use_dictionary: false
    n_components: 4480
    alpha: 1.0
    iter: 1
    fit_algorithm: "ista"
    constrained: true
    maxiter: 200
    tol: 1e-5
    positive_code: true
    backtrack: false
    fast: true
    accum_batch: 1
    repeat_factor: 8

  prompt: ""
  seed: 42
  output_dir: "output/InternVL/Caption/TextCaps_EWC"

  amp: true
  resume_ckpt_path: null
  # resume_ckpt_path: "/path/to/checkpoint_final.pth"
  evaluate: false
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
