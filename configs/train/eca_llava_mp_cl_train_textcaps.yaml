# ===================== Model definition =====================
model:
  arch: mp_llava_v0_general
  model_type: cl_caption_llava_v0
  # load base LLaVA weights for initialization
  load_pretrained: true
  # model_path: checkpoints/LLaVA/llava-7b-v0-mm-projector
  # model_base: checkpoints/LLaVA/vicuna-7b-v0
  # checkpoint containing projector + Vicuna
  model_path: checkpoints/LLaVA/llava-7b-v0
  model_base: null
  model_name: llava-v0
  # length of optional soft prompt used by PA
  soft_prompt_len: 32
  # number of transformer layers augmented with PA
  alignment_layers: 6
  # enable mixture-of-query module for prompt adaptation
  mix_query: false
  # KL weight when KD is enabled
  kd_weight: 0.1
  prompt: "Describe this image in detail with one sentence."
  kd_prompt: "Describe this image in detail with one sentence."
  train_projector: false
  # ModalPrompt settings
  use_modal_prompt: true
  mp_prefix_len: 10
  mp_transfer_num: 3
  mp_lam: 0.5
  mp_loss_weight: 1.0
  mp_clip_model_name: "openai/clip-vit-large-patch14"

# ===================== Dataset + processors =====================
datasets:
  cl_textcaps_caption:
    vis_processor:
      train:
        name: llava_clip_image_train
        visual_encoder_name: openai/clip-vit-large-patch14
      eval:
        name: llava_clip_image_eval
        visual_encoder_name: openai/clip-vit-large-patch14
    text_processor:
      train:
        name: "blip_caption"
        prompt: "Describe this image in detail with one sentence."
      eval:
        name: "blip_caption"

# ===================== Training / runner settings =====================
run:
  # continual-learning runner (handles task splitting)
  runner: runner_cl
  task: eca_llava_captioning
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 100
  weight_decay: 0.05
  lr_layer_decay: 1.0
  max_epoch: 5
  batch_size_train: 4
  batch_size_eval: 16
  num_workers: 32
  accum_grad_iters: 1

  max_len: 16
  min_len: 8
  num_beams: 1
  temperature: 0.2
  top_p: null

  # first task sees this many topics
  init_topic: 1
  # topics added per subsequent task
  topic_per_task: 1

  # allow dynamic PA expansion based on FIM
  expand_pa: false
  fim_metric: "i_fim"
  fim_threshold: 0.5
  # EWC setting
  use_ewc: false
  # set true to only tune visual LoRA in first task
  lora_visual_first: false

# ---------- Optional replay/dictionary learning ----------
  dictionary_learning:
    use_dictionary: false
    n_components: 20480
    alpha: 1.0
    iter: 1
    fit_algorithm: "ista"
    constrained: true
    maxiter: 200
    tol: 1e-5
    positive_code: true
    backtrack: false
    fast: true
    accum_batch: 1

  # user instruction appended when question empty
  prompt: ""
  seed: 42
  output_dir: "output/LLaVA/Caption/TextCaps_ModalPrompt"

  # enable torch.cuda.amp
  amp: true
  resume_ckpt_path: null
  # resume_ckpt_path: "/path/to/checkpoint_final.pth"
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  # set false for single-process debugging
  distributed: True
