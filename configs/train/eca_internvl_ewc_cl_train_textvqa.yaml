# ===================== Model definition =====================
model:
  arch: pa_internvl_general
  model_type: cl_vqa_internvl2_5
  # `model_path` selects the InternVL2.5 checkpoint size, e.g. 1B, 4B, or 8B.

  # Checkpoint / loader ------------------------------------------------
  load_pretrained: true
  # model_path: checkpoints/InternVL/InternVL2_5-1B
  model_path: checkpoints/InternVL/InternVL2_5-4B
  # Official 2.5-1B checkpoint defaults to flash attention, but the
  # current ECA adapter path only supports eager attention.
  use_flash_attn: false
  llm_config:
    attn_implementation: eager
    _attn_implementation: eager

  # Official InternVL config ------------------------------------------
  template: internvl2_5
  select_layer: -1
  force_image_size: 448
  dynamic_image_size: true
  use_thumbnail: true
  ps_version: v2
  min_dynamic_patch: 1
  # Official TextVQA eval uses --dynamic with default max-num=6.
  max_dynamic_patch: 4
  downsample_ratio: 0.5
  # Checkpoint / stage-1 defaults are 16384; 2nd finetune commonly drops to 8192.
  model_max_length: 8192
  drop_path_rate: 0.0

  # Vision & adapters --------------------------------------------------
  freeze_vit: true
  train_projector: false
  vision_lora_r: 16
  vision_lora_alpha: 32

  # Soft prompt / MoQ --------------------------------------------------
  soft_prompt_len: 32
  use_prompt_anchor: false
  mix_query: false
  kd_weight: 0.2
  ortho: true
  ortho_weight: 1.0

  # Adapter settings ---------------------------------------------------
  alignment_layers: 6
  mh_pa_r: 32.0
  mh_pa_dropout: 0.0
  mh_pa_scale: 4.0
  ffn_pa_r: 8.0
  ffn_pa_dropout: 0.0
  ffn_pa_scale: 4.0

  # Text / prompts -----------------------------------------------------
  # Dictionary replay reshapes feature atoms back into fixed-length visual
  # token sequences. Each InternVL image block contributes `num_image_token`
  # tokens, so replay length is `num_image_token * dict_patch_blocks`.
  dict_patch_blocks: 2
  # This caps generation-time query tokenization. It includes the expanded
  # IMG_CONTEXT block, so keeping it high avoids truncating image tokens.
  max_txt_len: 16384
  # Official TextVQA eval uses 10 / 1 for max / min new tokens.
  max_answer_len: 10
  prompt: ""
  kd_prompt: "What is in the image? Answer in one sentence."
  use_ocr_input: false

# ===================== Dataset + processors =====================
datasets:
  cl_textvqa_vqa_internvl:
    vis_processor:
      train:
        name: internvl_image_train
        image_size: 448
        dynamic_image_size: true
        use_thumbnail: true
        min_dynamic_patch: 1
        max_dynamic_patch: 4
        pad2square: false
        normalize_type: imagenet
      eval:
        name: internvl_image_eval
        image_size: 448
        dynamic_image_size: true
        use_thumbnail: true
        min_dynamic_patch: 1
        max_dynamic_patch: 4
        pad2square: false
        normalize_type: imagenet
    text_processor:
      train:
        name: "blip_prompt_question"
        prompt: "{} Answer the question using a single word or phrase."
      eval:
        name: "blip_question"

# ===================== Training / runner settings =====================
run:
  runner: runner_cl
  task: eca_internvl_vqa
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 100
  weight_decay: 0.05
  # Official InternVL2.5 8B 2nd-finetune also uses weight_decay=0.05.
  lr_layer_decay: 0.95
  max_epoch: 5
  batch_size_train: 3
  batch_size_eval: 8
  num_workers: 32
  accum_grad_iters: 1

  # Official InternVL VQA eval uses 10 / 1 with greedy decoding.
  max_len: 10
  min_len: 1
  num_beams: 1
  temperature: 0.0
  top_p: null

  init_topic: 1
  topic_per_task: 1

  expand_pa: true
  fim_metric: "i_fim"
  # EWC baseline keeps the initial PA and prevents further FeDEx expansion.
  # i_fim is normalized to [0, 1], and expansion uses fim_dc > threshold.
  fim_threshold: 1.0
  use_ewc: true
  lora_visual_first: false

  dictionary_learning:
    use_dictionary: false
    n_components: 10240
    alpha: 1.0
    iter: 1
    fit_algorithm: "ista"
    constrained: true
    maxiter: 200
    tol: 1e-5
    positive_code: true
    backtrack: false
    fast: true
    accum_batch: 1
    repeat_factor: 8

  prompt: "{} Answer the question using a single word or phrase."
  seed: 42
  output_dir: "output/InternVL/VQA/TextVQA_EWC"

  amp: true
  resume_ckpt_path: null
  # resume_ckpt_path: "/path/to/checkpoint_final.pth"
  evaluate: false
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
