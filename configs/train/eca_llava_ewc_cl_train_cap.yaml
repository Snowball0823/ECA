# ===================== Model definition =====================
model:
  arch: pa_llava_v0_general
  model_type: cl_caption_llava_v0
  # load base LLaVA weights before continual finetuning
  load_pretrained: true
  model_path: checkpoints/LLaVA/llava-7b-v0
  model_base: checkpoints/LLaVA/vicuna-7b-v0
  model_name: llava-v0
  # length of learnable soft prompt inserted before text tokens
  soft_prompt_len: 32
  # number of transformer blocks equipped with PA
  alignment_layers: 6
  # enable mixture-of-query prompting
  mix_query: false
  # weight for KD loss when replaying dictionary samples
  kd_weight: 0.1
  prompt: "Describe this image in detail."
  kd_prompt: "Describe this image in detail."

# ===================== Dataset + processors =====================
datasets:
  cl_coco_caption:
    vis_processor:
      train:
        name: llava_clip_image_train
        visual_encoder_name: openai/clip-vit-large-patch14
      eval:
        name: llava_clip_image_eval
        visual_encoder_name: openai/clip-vit-large-patch14
    text_processor:
      train:
        name: "blip_caption"
        prompt: "Describe this image in detail."
      eval:
        name: "blip_caption"

# ===================== Training / runner settings =====================
run:
  # continual-learning runner handling topic splits
  runner: runner_cl
  task: eca_llava_captioning
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 100
  weight_decay: 0.05
  lr_layer_decay: 1.0
  max_epoch: 5
  batch_size_train: 16
  batch_size_eval: 16
  num_workers: 32
  accum_grad_iters: 1

  max_len: 32
  min_len: 8
  num_beams: 1
  temperature: 0.2
  top_p: null

  # number of topics used in first task
  init_topic: 1
  # topics appended for every subsequent task
  topic_per_task: 1

  # whether to spawn new PA when FIM similarity is high
  expand_pa: true
  fim_metric: "i_fim"
  # EWC baseline keeps the initial PA and prevents further FeDEx expansion.
  # i_fim is normalized to [0, 1], and expansion uses fim_dc > threshold.
  fim_threshold: 1.0
  # enable elastic weight consolidation
  use_ewc: true
  # train vision LoRA first before enabling other adapters
  lora_visual_first: false

# ---------- Optional replay/dictionary learning ----------
  dictionary_learning:
    use_dictionary: false
    n_components: 20480
    alpha: 1.0
    iter: 1
    fit_algorithm: "ista"
    constrained: true
    maxiter: 200
    tol: 1e-5
    positive_code: true
    backtrack: false
    fast: true
    accum_batch: 1

  prompt: ""
  seed: 42
  output_dir: "output/LLaVA/Caption/Caption_coco_EWC"

  # enable torch.cuda.amp for memory saving
  amp: true
  resume_ckpt_path: null
  # resume_ckpt_path: "/path/to/checkpoint_final.pth"
  evaluate: false
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  # run training with DDP when true
  distributed: True
