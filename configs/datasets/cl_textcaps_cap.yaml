datasets:
  cl_textcaps_caption: # name of the dataset builder
    # data_dir: ${env.data_dir}/datasets
    data_type: images # [images|videos|features]

    build_info:
      # Be careful not to append minus sign (-) before split to avoid itemizing
      annotations:
        train:
          url: 
            - /path/or/url/to/tos_textcaps_caption_train.json
          storage: 
            - TextCaps/tos_textcaps_caption_train.json
        val:
          url: 
            - /path/or/url/to/tos_textcaps_caption_val_eval.json
          storage: 
            - TextCaps/tos_textcaps_caption_val_eval.json
        test:
          url: 
            - /path/or/url/to/tos_textcaps_caption_val.json
          storage: 
            - TextCaps/tos_textcaps_caption_val.json
      images:
        # storage: nocaps/images
        storage: TextCaps/images
