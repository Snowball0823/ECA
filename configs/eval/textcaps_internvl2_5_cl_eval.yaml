model:
  arch: pa_internvl_general
  model_type: cl_caption_internvl2_5
  # `model_path` selects the InternVL2.5 checkpoint size, e.g. 1B, 4B, or 8B.

  load_pretrained: true
  model_path: checkpoints/InternVL/InternVL2_5-1B
  use_flash_attn: false
  llm_config:
    attn_implementation: eager
    _attn_implementation: eager

  template: internvl2_5
  select_layer: -1
  force_image_size: 448
  dynamic_image_size: true
  use_thumbnail: true
  ps_version: v2
  min_dynamic_patch: 1
  max_dynamic_patch: 6
  downsample_ratio: 0.5
  model_max_length: 8192
  drop_path_rate: 0.0

  freeze_vit: true
  train_projector: false
  vision_lora_r: 16
  vision_lora_alpha: 32

  soft_prompt_len: 32
  use_prompt_anchor: false
  mix_query: false
  kd_weight: 0.1
  ortho: true
  ortho_weight: 1.0

  alignment_layers: 4
  mh_pa_r: 32.0
  mh_pa_dropout: 0.0
  mh_pa_scale: 4.0
  ffn_pa_r: 8.0
  ffn_pa_dropout: 0.0
  ffn_pa_scale: 4.0

  dict_patch_blocks: 1
  max_txt_len: 16384
  max_answer_len: 30
  prompt: "Provide a one-sentence caption for the provided image."
  kd_prompt: "Provide a one-sentence caption for the provided image."

datasets:
  cl_textcaps_caption_internvl:
    vis_processor:
      eval:
        name: internvl_image_eval
        image_size: 448
        dynamic_image_size: true
        use_thumbnail: true
        min_dynamic_patch: 1
        max_dynamic_patch: 6
        pad2square: false
        normalize_type: imagenet
    text_processor:
      eval:
        name: "blip_caption"

run:
  runner: runner_cl
  task: eca_internvl_captioning
  batch_size_train: 32
  batch_size_eval: 16
  num_workers: 4

  max_len: 30
  min_len: 8
  num_beams: 1
  temperature: 0.0
  top_p: null

  init_topic: 1
  topic_per_task: 1

  seed: 42
  output_dir: "output/InternVL/Caption/TextCaps_ZeroShot"

  evaluate: true
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
